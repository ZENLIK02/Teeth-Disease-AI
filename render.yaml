services:
  - type: web
    name: oral-ai-prototype
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=production node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
